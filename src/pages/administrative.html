<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducaInclui Pascal | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/administrative.css" />
</head>
<body>
    <div class="page">
        <div class="admin-dashboard">
            <aside class="sidebar educacional">
                <div class="sidebar-profile">
                    <div class="avatar-column">
                        <div class="avatar">A</div>
                        <span class="profile-plan">Plano educacional</span>
                    </div>
                    <div class="profile-info">
                        <strong>Escola</strong>
                        <span class="profile-role">Administrador</span>
                    </div>
                </div>

                <div class="sidebar-body">
                    <nav class="sidebar-nav">
                        <a href="administrative.html" class="active"><span class="nav-icon nav-icon-dashboard"></span>Dashboard</a>
                        <a href="courses.html"><span class="nav-icon nav-icon-courses"></span>Meu cursos</a>
                    </nav>

                    <div class="sidebar-bottom">
                        <a href="../../index.html" class="logout-link"><span class="nav-icon nav-icon-logout"></span>Sair</a>
                    </div>
                </div>
            </aside>

            <main class="admin-main">
                <section class="admin-header">
                    <h1>Dashboard</h1>
                    <p>Visão geral dos cursos e conteúdos cadastrados na plataforma.</p>
                </section>

                <section class="dashboard-summary">
                    <div class="dashboard-card">
                        <span class="card-label">Total de cursos</span>
                        <strong id="totalCoursesCount">0</strong>
                    </div>
                    <div class="dashboard-card">
                        <span class="card-label">Total de aulas</span>
                        <strong id="totalLessonsCount">0</strong>
                    </div>
                </section>

                <section class="top-courses">
                    <div class="top-courses-header">
                        <h2>Cursos cadastrados</h2>
                        <a href="courses.html" class="dash-link">Gerenciar cursos</a>
                    </div>
                    <div class="top-courses-list" id="dashCoursesList">
                        <p class="dash-empty">Nenhum curso cadastrado ainda. <a href="courses.html">Adicionar curso</a></p>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="../js/utils/Dom.js"></script>
    <script src="../js/models/Question.js"></script>
    <script src="../js/models/Lesson.js"></script>
    <script src="../js/models/Course.js"></script>
    <script src="../js/core/CoursesDB.js"></script>
    <script src="../js/pages/AdministrativePage.js"></script>
</body>
</html>
