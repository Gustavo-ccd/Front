<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EducaInclui Pascal | Assistindo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/course-view.css" />
</head>
<body>
    <div class="cv-layout">

        <!-- ── Coluna esquerda: lista de aulas ─────────────────────────── -->
        <aside class="cv-sidebar">
            <div class="cv-sidebar-top">
                <a href="user.html" class="cv-back">← Voltar</a>
                <h2 class="cv-course-title" id="cvCourseTitle"></h2>
            </div>
            <ul class="cv-lesson-list" id="cvLessonList"></ul>
        </aside>

        <!-- ── Coluna central: player ──────────────────────────────────── -->
        <main class="cv-main">
            <div class="cv-video-header">
                <h3 id="cvLessonTitle">Selecione uma aula</h3>
                <button class="cv-next-btn" id="cvNextBtn" type="button" disabled>Próxima aula →</button>
            </div>
            <div class="cv-video-wrap">
                <div class="cv-video-box">
                    <video id="cvVideo" controls>
                        Seu navegador não suporta vídeo HTML5.
                    </video>
                    <div class="cv-no-video" id="cvNoVideo">
                        <span>▶</span>
                        <p>Nenhum vídeo disponível para esta aula</p>
                    </div>
                </div>
            </div>
            <p id="cvLessonDesc" class="cv-lesson-desc"></p>
        </main>

        <!-- ── Coluna direita: abas ────────────────────────────────────── -->
        <aside class="cv-right">

            <div class="cv-tabs">
                <button class="cv-tab active" data-panel="tab_questions">
                    Perguntas
                    <span class="cv-tab-badge" id="cvQueueBadge">0</span>
                </button>
                <button class="cv-tab" data-panel="tab_notes">Anotações</button>
                <button class="cv-tab" data-panel="tab_gabarito">Gabarito</button>
            </div>

            <div class="cv-tab-panel" id="tab_questions">
                <p class="cv-questions-hint" id="cvQuestionsHint">
                    As perguntas serão liberadas conforme o vídeo avança.
                </p>
                <div class="cv-questions-list" id="cvQuestionsList"></div>
            </div>

            <div class="cv-tab-panel" id="tab_notes" style="display:none">
                <div class="cv-notepad-top">
                    <span class="cv-saved-indicator" id="cvSavedIndicator">salvo ✓</span>
                </div>
                <textarea
                    class="cv-notepad"
                    id="cvNotepad"
                    placeholder="Faça suas anotações aqui. Elas ficam salvas por aula."
                ></textarea>
            </div>

            <div class="cv-tab-panel" id="tab_gabarito" style="display:none">
                <div class="cv-gabarito-list" id="cvGabaritoList">
                    <p class="cv-questions-hint">Selecione uma aula para ver o gabarito.</p>
                </div>
            </div>

        </aside>
    </div>

    <!-- ── Overlay de pergunta (pausa vídeo) ──────────────────────────── -->
    <div class="cv-q-overlay" id="cvQOverlay" style="display:none">
        <div class="cv-q-modal">
            <div class="cv-q-modal-header">
                <span class="cv-q-modal-badge" id="cvQBadge">Pergunta 1</span>
            </div>
            <p class="cv-q-modal-text" id="cvQText"></p>
            <div id="cvQAnswerArea"></div>
            <div class="cv-q-feedback" id="cvQFeedback"></div>
            <div class="cv-q-gabarito" id="cvQGabarito" style="display:none"></div>
            <div class="cv-q-modal-actions">
                <button class="cv-q-skip"   id="cvQSkip">Pular</button>
                <button class="cv-q-submit" id="cvQSubmit">Responder</button>
            </div>
        </div>
    </div>

    <script src="../js/utils/Dom.js"></script>
    <script src="../js/utils/Queue.js"></script>
    <script src="../js/models/Question.js"></script>
    <script src="../js/models/Lesson.js"></script>
    <script src="../js/models/Course.js"></script>
    <script src="../js/core/CoursesDB.js"></script>
    <script src="../js/core/VideoDB.js"></script>
    <script src="../js/pages/CourseViewPage.js"></script>
</body>
</html>
