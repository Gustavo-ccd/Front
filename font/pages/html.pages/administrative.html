<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EducaInclui Pascal — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/font/pages/css.pages/global.css" />
  <link rel="stylesheet" href="/font/pages/css.pages/administrative.css" />
  <script>
    const _u = JSON.parse(localStorage.getItem('usuarioLogado') || 'null')
    const _adminRoles = ['professor', 'educacional', 'empresarial']
    if (!_u || !_adminRoles.includes(_u.tipo)) window.location.replace('/index.html')
  </script>
  <style>html,body{background:#0d1117;margin:0;padding:0}</style>
</head>
<body>
<div class="page">
  <div class="admin-dashboard">

    <aside class="sidebar educacional">
      <div class="sidebar-profile">
        <div class="avatar-column">
          <div class="avatar">A</div>
        </div>
        <div class="profile-info">
          <strong>Escola</strong>
          <span class="profile-role">Administrador</span>
        </div>
      </div>
      <div class="sidebar-body">
        <nav class="sidebar-nav">
          <a href="/font/pages/html.pages/administrative.html" class="active">
            <span class="nav-icon nav-icon-dashboard"></span>Dashboard
          </a>
          <a href="/font/pages/html.pages/course.html">
            <span class="nav-icon nav-icon-courses"></span>Meus cursos
          </a>
        </nav>
        <div class="sidebar-bottom">
          <a href="#" class="logout-link" id="logout-btn">
            <span class="nav-icon nav-icon-logout"></span>Sair
          </a>
        </div>
      </div>
    </aside>

    <main class="admin-main">
      <section class="admin-header">
        <h1>Dashboard</h1>
        <p>Visão geral dos cursos e conteúdos cadastrados na plataforma.</p>
      </section>
      <div id="admin-app"></div>
    </main>

  </div>
</div>

<script>
  document.getElementById('logout-btn').addEventListener('click', e => {
    e.preventDefault()
    localStorage.removeItem('usuarioLogado')
    window.location.href = '/index.html'
  })
</script>
<script type="module" src="/font/src/react.src/entries/administrative.jsx"></script>
</body>
</html>
