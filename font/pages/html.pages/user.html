<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EducaInclui Pascal — Meus Cursos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/font/pages/css.pages/global.css" />
  <link rel="stylesheet" href="/font/pages/css.pages/user.css" />
  <script>
    const _u = JSON.parse(localStorage.getItem('usuarioLogado') || 'null')
    if (!_u || _u.tipo !== 'cliente') window.location.replace('/index.html')
  </script>
  <style>html,body{background:#0d1117;margin:0;padding:0}</style>
</head>
<body>
<div class="page">
  <div class="user-dashboard">

    <aside class="sidebar">
      <div class="sidebar-profile">
        <div class="avatar-column">
          <div class="avatar">U</div>
          <button class="sidebar-profile-button" id="profile-btn">Meu Perfil</button>
        </div>
        <div class="profile-info">
          <strong>Usuário EducaInclui Pascal</strong>
          <span>Olá, bem-vindo</span>
        </div>
      </div>
      <div class="sidebar-body">
        <nav class="sidebar-nav">
          <a href="/font/pages/html.pages/user.html" class="active">
            <span class="nav-icon nav-icon-home"></span>Início
          </a>
        </nav>
      </div>
    </aside>

    <main class="search-page">
      <div id="user-app"></div>
    </main>

  </div>
</div>

<div class="modal" id="perfil-modal">
  <div class="modal-conteudo">
    <button class="modal-fechar" id="perfil-fechar">X</button>
    <h2 id="modalTitulo">Meu Perfil</h2>
    <div id="modalCorpo">
      <div class="modal-campo">
        <label>Nome:</label>
        <p id="perfil-nome">—</p>
      </div>
      <div class="modal-campo">
        <label>E-mail:</label>
        <p id="perfil-email">—</p>
      </div>
      <button class="modal-botao" id="perfil-logout">Sair</button>
    </div>
  </div>
</div>

<script>
;(function () {
  const _usuario    = JSON.parse(localStorage.getItem('usuarioLogado') || 'null')
  const _perfilModal = document.getElementById('perfil-modal')

  function abrirPerfil() {
    if (_usuario) {
      document.getElementById('perfil-nome').textContent  = _usuario.nome  || 'Usuário Pascal'
      document.getElementById('perfil-email').textContent = _usuario.email || '—'
    }
    _perfilModal.classList.add('ativo')
  }

  function fecharPerfil() { _perfilModal.classList.remove('ativo') }

  document.getElementById('profile-btn').addEventListener('click', abrirPerfil)
  document.getElementById('perfil-fechar').addEventListener('click', fecharPerfil)
  _perfilModal.addEventListener('click', e => { if (e.target === _perfilModal) fecharPerfil() })
  document.getElementById('perfil-logout').addEventListener('click', () => {
    localStorage.removeItem('usuarioLogado')
    window.location.href = '/index.html'
  })
}())
</script>
<script type="module" src="/font/src/react.src/entries/user.jsx"></script>
</body>
</html>
